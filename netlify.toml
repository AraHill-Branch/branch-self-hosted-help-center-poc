[build]
  publish = ".vitepress/dist"
  command = "npm run docs:build"

[build.environment]
  NODE_VERSION = "18"

# Handle SPA routing for VitePress
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

# =============================================================================
# Branch Help Center — security headers (Netlify)
# =============================================================================
# The CSP value MUST be a single line. The grouped, commented breakdown of
# what each source is for lives in .vitepress/csp-reference.md — edit
# there, then re-flatten into this line.
#
# Analytics/consent scripts (GTM/GA/Amplitude/OneTrust) are commented out
# in csp-reference.md until set up and ready to test.
# =============================================================================

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; upgrade-insecure-requests; worker-src 'self' blob:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob:; connect-src 'self' https://api2.branch.io; media-src 'self'; frame-src 'self'"

    # Optional companion hardening headers (uncomment to add):
    # X-Content-Type-Options = "nosniff"
    # Referrer-Policy = "strict-origin-when-cross-origin"