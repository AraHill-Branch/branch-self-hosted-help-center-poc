[build]
  publish = ".vitepress/dist"
  command = "npm run docs:build"

[build.environment]
  NODE_VERSION = "18"

# Handle SPA routing for VitePress
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

# =============================================================================
# Branch Help Center — security headers (Netlify)
# =============================================================================
# CSP is delivered as an HTTP response header (NOT a <meta> tag) because
# `frame-ancestors` — which is what lets WorkRamp iframe this site — is
# ignored when CSP is set via <meta>. Headers are also enforced earlier.
#
# Do NOT also set X-Frame-Options here. XFO can't express an allowlist
# beyond a single origin, so SAMEORIGIN/DENY would block the WorkRamp
# embed. `frame-ancestors` below is the modern replacement and supersedes
# it in every browser you care about.
#
# The CSP value MUST be a single line. The grouped, commented breakdown of
# what each source is for lives in .vitepress/csp-reference.md — edit
# there, then re-flatten into this line.
# =============================================================================

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy-Report-Only = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self' https://branch.app.workramp.com; form-action 'self'; upgrade-insecure-requests; worker-src 'self' blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://*.amplitude.com https://cdn.cookielaw.org https://app.intercom.io https://widget.intercom.io https://js.intercomcdn.com; style-src 'self' 'unsafe-inline' https://cdn.cookielaw.org; font-src 'self' data: https://js.intercomcdn.com https://fonts.intercomcdn.com; img-src 'self' data: blob: https://www.googletagmanager.com https://*.google-analytics.com https://stats.g.doubleclick.net https://cdn.cookielaw.org https://js.intercomcdn.com https://static.intercomassets.com https://downloads.intercomcdn.com https://downloads.intercomcdn.eu https://downloads.au.intercomcdn.com https://uploads.intercomusercontent.com https://gifs.intercomcdn.com https://video-messages.intercomcdn.com https://messenger-apps.intercom.io https://messenger-apps.eu.intercom.io https://messenger-apps.au.intercom.io https://*.intercom-attachments-1.com https://*.intercom-attachments-2.com https://*.intercom-attachments-3.com https://*.intercom-attachments-4.com https://*.intercom-attachments-5.com https://*.intercom-attachments-6.com https://*.intercom-attachments-7.com https://*.intercom-attachments-8.com https://*.intercom-attachments-9.com https://*.intercom-attachments.eu https://*.au.intercom-attachments.com https://static.intercomassets.eu https://static.au.intercomassets.com; connect-src 'self' https://api2.branch.io https://www.googletagmanager.com https://*.google-analytics.com https://*.analytics.google.com https://stats.g.doubleclick.net https://*.amplitude.com https://cdn.cookielaw.org https://geolocation.onetrust.com https://via.intercom.io https://api.intercom.io https://api.au.intercom.io https://api.eu.intercom.io https://api-iam.intercom.io https://api-iam.eu.intercom.io https://api-iam.au.intercom.io https://api-ping.intercom.io https://*.intercom-messenger.com wss://*.intercom-messenger.com https://nexus-websocket-a.intercom.io wss://nexus-websocket-a.intercom.io https://nexus-websocket-b.intercom.io wss://nexus-websocket-b.intercom.io https://nexus-europe-websocket.intercom.io wss://nexus-europe-websocket.intercom.io https://nexus-australia-websocket.intercom.io wss://nexus-australia-websocket.intercom.io https://uploads.intercomcdn.com https://uploads.intercomcdn.eu https://uploads.au.intercomcdn.com https://uploads.eu.intercomcdn.com https://uploads.intercomusercontent.com; media-src 'self' https://js.intercomcdn.com https://downloads.intercomcdn.com https://downloads.intercomcdn.eu https://downloads.au.intercomcdn.com; frame-src 'self' https://intercom-sheets.com https://www.intercom-reporting.com"

    # Optional companion hardening headers (uncomment to add):
    # X-Content-Type-Options = "nosniff"
    # Referrer-Policy = "strict-origin-when-cross-origin"
    # NOTE: deliberately NOT setting X-Frame-Options — see comment above.