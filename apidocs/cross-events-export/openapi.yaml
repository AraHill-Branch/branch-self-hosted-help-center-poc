        filter:
          type: object
          description: An object representing a filter, or multiple filters. See filter [examples](https://help.branch.io/developers-hub/reference/cross-events-export-api#filters).
          example: {"type":"in","dimension":"name","values":["x","y"]}
        granularity:
          type: string
          description: The time granularity that each band value will represent.
          default: all
          enum:
            - day
            - week
            - month
            - all
        limit_sort_spec:
          type: object
          description: An object describing column/row ordering and limiting. See [schema](https://help.branch.io/developers-hub/reference/cross-events-export-api#schema-for-limit_sort_spec).
          example: { "sort_columns": [] }
        aggregations:
          type: array
          description: An array where each element is an aggregation object. Aggregation object requires field name, display name, and data source. See [schema](https://help.branch.io/developers-hub/reference/cross-events-export-api#schema-for-aggregation) and [more](https://help.branch.io/developers-hub/reference/cross-events-export-api#data-source--field-name).
          example: [{ "field_name": "sketch_unique_count", "display_name": "unique_lifecycle_events_count", "data_source": "eo_user_lifecycle_event"}, {"field_name":"total_count","display_name":"eo_click","data_source":"eo_click"}]
          items:
            type: object
        response_format_compression:
          type: string
          description: Compression method to use for data file.
          default: snappy
          enum:
            - snappy
            - gz
        response_format:
          type: string
          description: Compression format to use for data file.
          default: parquet
          enum:
            - parquet
            - csv
            - json
