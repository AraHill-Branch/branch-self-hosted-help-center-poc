openapi: 3.0.0
info:
  title: Cross-Events Export API
  description: Query and compare vast pools of data across multiple sources.
  termsOfService: "https://branch.io/policies/"
  contact:
    name: Branch Support
    url: "https://help.branch.io/using-branch/page/submit-a-ticket"
    email: support@branch.io
  version: 1.0.0
servers:
  - url: "https://api2.branch.io/v1"
security:
  - appId: []
    accessToken: []
tags:
  - name: Cross-Events Export API
    description: Query and compare vast pools of data across multiple sources.
paths:
  /branch_aggregate/async/analytics:
    post:
      tags:
        - Cross-Events Export API
      summary: Request Data Export
      description: Initiate an export of your aggregate Branch data.
      operationId: requestCrossEventsDataExport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/analytics_body"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200"
              examples:
                Result:
                  value: |-
                    {
                      "code": 200,
                      "job_id": "XXXX-0000-xxxx",
                      "status_url": "https://api2.branch.io/v1/branch_aggregate/async/status/a1b2c3d4"
                    }
        "400":
          description: Bad request — typically an invalid or missing credential or parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_400"
              examples:
                Result:
                  value: |-
                    {
                        "error": {
                            "message": "Authentication failed.",
                            "code": 400
                        }
                    }
  "/branch_aggregate/async/status/{job_id}":
    get:
      tags:
        - Cross-Events Export API
      summary: Retrieve Download Status
      description: Receive a status update on your aggregate export request, as well as a URL to the data.
      operationId: retrieveExportDownloadStatus
      parameters:
        - name: job_id
          in: path
          description: The unique ID of the request. Obtained from the [export request](https://help.branch.io/developers-hub/reference/cross-events-export-api#request-data-export).
          required: true
          style: simple
          explode: false
          schema:
            type: string
        - name: app_id
          in: query
          description: The unique identifier for the app. Alternatively, provide `organization_id`.
          required: true
          style: form
          schema:
            type: string
      responses:
        "200":
          description: Job Successfully Finished
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_1"
              examples:
                Result:
                  value:
                    code: 200
                    status: FINISHED
                    response_url: "https://branch-exports-usw2.s3.amazonaws.com/partner-query/2023-05-12-2023-05-19-eo_install-day-{JOB_ID}.csv?Signature={SIGNATURE}&AWSAccessKeyId={AWS_KEY}&Expires={EXPIRATION}"
        "400":
          description: Bad request — typically an invalid or missing credential or parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_400"
              examples:
                Result:
                  value: |-
                    {
                        "error": {
                            "message": "Authentication failed.",
                            "code": 400
                        }
                    }
        "404":
          description: Job ID Not Found
components:
  schemas:
    inline_response_200_1:
      type: object
      properties:
        code:
          type: integer
          example: 200
          description: Response code
        job_id:
          type: string
          description: The unique ID of the request.
          example: XXXX-0000-xxxx
        status_url:
          type: string
          description: The URL of the export request.
          example: "https://api2.branch.io/v1/branch_aggregate/async/status/a1b2c3d4"
    inline_response_200:
      type: object
      properties:
        code:
          type: integer
          example: 200
        job_id:
          type: string
          description: The unique ID of the request.
          example: XXXX-0000-xxxx
        status_url:
          type: string
          description: The URL of the export request.
          
          example: "https://api2.branch.io/v1/branch_aggregate/async/status/a1b2c3d4"
    analytics_body:
      type: object
      description: ""
      x-examples: {}
      properties:
        start_date:
          type: string
          description: The start of the interval time range represented as an ISO-8601 complete date.
          format: date
          example: "2023-05-15"
        end_date:
          type: string
          description: The end of the interval time range represented as an ISO-8601 complete date.
          format: date
          example: "2023-05-16"
        dimensions:
          type: array
          description: An array representing dimension(s) to group by. See [dimensions](https://help.branch.io/developers-hub/reference/cross-events-export-api#dimensions) section for more.
