              example: ''
            $android_url:
              type: string
              description: Change the redirect endpoint for Android Play Store page for your app (set in Link Settings)
              example: ''
            $android_url_xx:
              type: string
              description: 'Change the redirect endpoint for Android based on a lower-case Alpha-2 country code. For example, $android_url_de="..." would redirect Germany deep link clicks.'
              example: ''
