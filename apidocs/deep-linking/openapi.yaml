openapi: 3.0.0
info:
  title: Deep Linking API
  description: The Deep Linking API creates and manages Branch links programmatically — generate links at scale and tag them by channel and campaign for analytics.
  termsOfService: 'https://branch.io/policies/'
  contact:
    name: Branch Support
    url: 'https://help.branch.io/using-branch/page/submit-a-ticket'
    email: support@branch.io
  version: 1.0.1
servers:
  - url: 'https://api2.branch.io/v1'
tags:
  - name: Deep Linking API
    description: The Deep Linking API creates and manages Branch links programmatically — generate links at scale and tag them by channel and campaign for analytics.
paths:
  /url:
    post:
      tags:
        - Deep Linking API
      summary: Create Deep Link
      description: This endpoint is used to generated a deep link URL based on the parameters provided
      operationId: createDeepLink
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/create_url_request_body'
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/create_url_200'
        '400':
          description: Bad request — typically an invalid or missing credential or parameter.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_400'
              examples:
                Result:
                  value: |-
                    {
                        "error": {
                            "message": "Authentication failed.",
                            "code": 400
                        }
                    }
        '429':
          description: Rate limit exceeded — reduce request frequency and retry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_400'
              examples:
                Result:
                  value: |-
                    {
                        "error": {
                            "code": 429,
                            "message": "Rate limit reached."
                        }
                    }
    delete:
      tags:
        - Deep Linking API
      summary: Delete Deep Link
      description: |
        This endpoint is used to delete existing deep link.
        
        **Note:** This endpoint requires both **App-Level** and **Sensitive Data** permissions. 
        You must pass an Access Token (API key) to use the DELETE method. Otherwise you may see an Unauthorized User error. See the Deep Linking API Overview's Authentication 
        section for details.
      externalDocs:
        description: "Authentication requirements and setup"
        url: "https://help.branch.io/apidocs/deep-linking-api#authentication"
      operationId: deleteDeepLink
      parameters:
        - name: Access-Token
          in: header
          description: |
            The Branch Access Token of the originating app obtained in your [Account Settings](https://help.branch.io/using-branch/docs/profile-settings)
          required: true
          schema:
            type: string
            example: api_app_xxxx
        - name: url
          in: query
          description: |
            The deep link url against which the details are to be fetched.
          required: true
          schema:
            type: string
            example: 'https://example.app.link/abCdEf123 '
        - name: app_id
          in: query
          description: |
            The Branch app_id against the associate deep link url
          required: true
          schema:
            type: string
            example: 123456789012345678
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/delete_url_200'
        '400':
          description: Bad request — typically an invalid or missing credential or parameter.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_400'
              examples:
                Result:
                  value: |-
                    {
                        "error": {
                            "message": "Authentication failed.",
                            "code": 400
                        }
                    }
        '429':
          description: Rate limit exceeded — reduce request frequency and retry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_400'
              examples:
                Result:
                  value: |-
                    {
                        "error": {
                            "code": 429,
                            "message": "Rate limit reached."
                        }
                    }
    get:
      tags:
        - Deep Linking API
      summary: Read Deep Link
      description: This endpoint is used retrieve the deep link url details based on the provided parameter
      operationId: readDeepLink
      parameters:
        - name: url
          in: query
          description: |
            The deep link url against which the details are to be fetched.
          required: true
          schema:
            type: string
            example: 'https://example.app.link/abCdEf123 '
        - name: branch_key
          in: query
          description: |
            The Branch key of the originating app; from your Branch Settings Dashboard
          required: true
          schema:
            type: string
            example: key_live_xxxx
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get_deep_link_details_200'
        '400':
          description: Bad request — typically an invalid or missing credential or parameter.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_400'
              examples:
                Result:
                  value: |-
                    {
                        "error": {
                            "message": "Authentication failed.",
                            "code": 400
                        }
                    }
        '429':
          description: Rate limit exceeded — reduce request frequency and retry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_400'
              examples:
                Result:
                  value: |-
                    {
                        "error": {
                            "code": 429,
                            "message": "Rate limit reached."
                        }
                    }
    put:
      tags:
        - Deep Linking API
      summary: Update Deep Link
      description: Updates an existing Branch deep link.
      operationId: updateDeepLink
      parameters:
        - name: url
          in: query
          description: The full URL of the deep link to update.
          required: true
          schema:
            type: string
            example: 'https://example.app.link/abCdEf123'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/update_url_request_body'
      responses:
        '200':
          description: Deep link updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/update_url_200'
        '400':
          description: Bad request — typically an invalid or missing credential or parameter.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_400'
              examples:
                Result:
                  value: |-
                    {
                        "error": {
                            "message": "Authentication failed.",
                            "code": 400
                        }
                    }
        '429':
          description: Rate limit exceeded — reduce request frequency and retry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_400'
              examples:
                Result:
                  value: |-
                    {
                        "error": {
                            "code": 429,
                            "message": "Rate limit reached."
                        }
                    }
  '/url/bulk/{branch_key}':
    post:
      tags:
        - Deep Linking API
      summary: Bulk Create Deep Links
      description: This endpoint is used to generated a deep link URL based on the parameters provided
      operationId: bulkCreateDeepLinks
      parameters:
        - name: branch_key
          in: path
          description: |
            The Branch key of the originating app; from your Branch Settings Dashboard
          required: true
          schema:
            type: string
            example: key_live_xxxx
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/create_bulk_url_request_array_body'
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/create_bulk_url_200'
        '400':
          description: Bad request — typically an invalid or missing credential or parameter.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_400'
              examples:
                Result:
                  value: |-
                    {
                        "error": {
                            "message": "Authentication failed.",
                            "code": 400
                        }
                    }
