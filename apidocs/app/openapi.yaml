openapi: 3.0.0
info:
  title: App API
  description: The App API allows developers to view and make updates to an existing Branch app configuration to better support workflows.
  termsOfService: 'https://branch.io/policies/'
  contact:
    name: Branch Support
    url: 'https://help.branch.io/using-branch/page/submit-a-ticket'
    email: support@branch.io
  version: 1.0.1
servers:
  - url: 'https://api2.branch.io/v1'
tags:
  - name: App API
    description: The App API allows developers to view and make updates to an existing Branch app configuration to better support workflows.
paths:
  '/app/{branch_key}':
    get:
      tags:
        - App API
      summary: Get Current Branch App Config
      operationId: getCurrentBranchAppConfig
      description: This endpoint retrieves all app related configurations for the requested branch.
      parameters:
        - name: branch_key
          in: path
          description: 'The Branch Key of the originating app obtained in your [Account Settings](https://help.branch.io/using-branch/docs/profile-settings)'
          required: true
          schema:
            type: string
            example: key_live_xxxx
        - name: branch_secret
          in: query
          description: 'The Branch Secret Key of the originating app obtained in your [Account Settings](https://help.branch.io/using-branch/docs/profile-settings)'
          style: form
          schema:
            type: string
            example: secret_live_xxxx
          required: true
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/app_config_get_200'
        '400':
          description: Authentication Failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_400'
              examples:
                Result:
                  value: |-
                    {
                        "error": {
                            "message": "Authentication failed !",
                            "code": 400
                        }
                    }
        '429':
          description: Rate Limit Reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_400'
              examples:
                Result:
                  value: |-
                    {
                        "error": {
                            "code": 429,
                            "message": "Rate limit reached."
                        }
                    }
    put:
      tags:
        - App API
      summary: Update Branch App Config
      description: This endpoint is used updated the existing branch app configurations.  All parameters passed within the request body will be updated as per the value provided.
      operationId: updateBranchAppConfig
      parameters:
        - name: branch_key
          in: path
          description: 'The Branch Key of the originating app obtained in your [Account Settings](https://help.branch.io/using-branch/docs/profile-settings)'
          required: true
          schema:
            type: string
            example: key_live_xxxx
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/app_config_put_request_body'
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/app_config_get_200'
        '400':
          description: Authentication Failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_400'
              examples:
                Result:
                  value: |-
                    {
                        "error": {
                            "message": "Authentication failed !",
                            "code": 400
                        }
                    }
        '429':
          description: Rate Limit Reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_400'
              examples:
                Result:
                  value: |-
                    {
                        "error": {
                            "code": 429,
                            "message": "Rate limit reached."
                        }
                    }
