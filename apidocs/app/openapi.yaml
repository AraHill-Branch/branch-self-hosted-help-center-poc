                  description: Deepview details
                  type: string
                  example: branch_clipboard_deepview
                deepview_audience_id:
                  description: Unique deepview id
                  type: integer
                  example: 0
            android:
              type: object
              description: Android related deep view configurations
              properties:
                enabled:
                  description: Indicate Android related configurations are enabled
                  type: boolean
                  example: true
                clipboard_deepview:
                  description: Deepview details
                  type: string
                  example: branch_clipboard_deepview
                deepview_audience_id:
                  description: Unique deepview id
                  type: integer
                  example: 0
        default_short_url_domain:
          description: Short URL to the default domain
          type: string
          example: branch.app.link
        desktop_uri_scheme:
          description: Standard URI scheme if available
          type: string
        esp_config:
