        destination:
          type: object
          description: Information about where a finished report is stored and how it can be accessed
          properties:
            subscription_type:
              type: string
              description: 'Should be set to branch if you want data stored in Branch''s S3 bucket, and accessible via API'
              example: cloud
            cloud:
              type: string
              description: 'The cloud service being used for external exports. Can be either `s3` or `gcs`.'
              example: s3
            bucket:
              type: string
              description: The cloud bucket being used for subscription.
              example: my-branch-export-bucket
            prefix:
              type: string
              description: The prefix or folder you are using for Branch exports.
              example: my-folder
            resource_access_id:
              type: string
              description: ARN for the Role (AWS) or full service account name (GCP) you are using for Branch exports.
              example: 'arn:aws:iam::xxxxxxxxxxxx:role/role-name-here'
            recipient_emails:
              description: Array of recipient emails associated with subscription
              type: array
              items:
                type: string
                example: example@branch.io
    deactivate_subscription_body:
      type: object
      description: Deactivate Subscription Body
      properties:
        status:
          type: string
          description: Indicates whether the deactivate request succeeded.
          example: SUCCESS
        description:
          type: string
          description: Additional information about the status of the request
          example: Subscription deactivated successfully
    get_external_id_body:
      type: object
      description: Body for external id
      properties:
        external_id:
          type: string
          description: A persistent external id against the App Id
          example: XXXX-0000-xxxx
    response_200_create_scheduled_log_export_subscription:
      type: object
      properties:
        subscription_id:
          type: string
          example: XXXX-0000-xxxx
          description: 'A persistent id for this subscription, used to check the status, locate recent export jobs, and make modifications'
        status:
          type: string
          description: |
            if PENDING, Branch is still working on an initial export to test out this subscription. If ACTIVE then the subscription was set up successfully. If FAILED then the test export was unsuccessful.
          example: PENDING
          enum:
            - PENDING
            - ACTIVE
            - FAILED
        description:
          type: string
          example: Generating sample report. Subscription will finish after Report is uploaded
          description: More information about the subscription's status.
        subscription_url:
          type: string
          example: 'https://api2.branch.io/scheduled-exports/exports/logs/subscription/{SUBSCRIPTION_ID_HERE}?app_id={APP_ID_HERE}'
          description: |
            Get details on this subscription. See the section "Get details on one log export subscription" below.
    inline_response_400:
      type: object
      properties:
        error:
          $ref: '#/components/schemas/inline_response_400_error'
    inline_response_400_error:
      type: object
      properties:
        message:
          type: string
          example: Authentication failed !
        code:
          type: integer
          example: 400
    inline_response_401:
