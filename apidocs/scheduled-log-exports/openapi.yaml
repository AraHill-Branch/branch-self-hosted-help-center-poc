        error:
          $ref: '#/components/schemas/inline_response_404_error'
    inline_response_404_error:
      type: object
      properties:
        message:
          type: string
          example: User Not Found
        code:
          type: integer
          example: 404
    inline_response_500:
      type: object
      properties:
        error:
          $ref: '#/components/schemas/inline_response_500_error'
    inline_response_500_error:
      type: object
      properties:
        message:
          type: string
          example: Internal Server Error
        code:
          type: integer
          example: 500
    get_export_job_body:
      type: object
      description: Export Job Body
      properties:
        job_id:
          type: string
          description: A persistent identifier for this export job run
          example: XXXX-0000-xxxx
        status:
          type: string
          description: 'whether the job is in progress, succeeded or failed. Available options are PENDING_GENERATION, PENDING_UPLOAD, RUNNING, SUCCEEDED and FAILED'
          enum:
            - PENDING_GENERATION
            - PENDING_UPLOAD
            - RUNNING
            - SUCCEEDED
          example: SUCCEEDED
        start_date:
          type: string
          description: |
            The earliest date for which exported objects will be included. Format is set to yyyy-MM-dd'T'HH:mm:ssZ. Timezone is UTC.
          example: '2023-05-19T00:00:00.000-00:00'
        end_date:
          type: string
          description: |
            The latest date for which exported objects will be included. Format is set to yyyy-MM-dd'T'HH:mm:ssZ. Timezone is UTC. Please note that this includes data through the final millisecond. So if end_date is 2023-05-30T19:59:59, this export job run will include data through the final millisecond i.e. 2023-05-30T19:59:59.999.
          example: '2023-05-20T00:00:00.000-00:00'
        export_url:
          description: |
            if the export job is for a subscription with destination.subscription_type set to branch, then this will be an array of pre-signed S3 URLs for export files that you can then download.
          type: array
          items:
            type: string
            example: 'https://branch-exports-web-usw2.s3.us-west-1.amazonaws.com/v2/y%3D2021/m%3D09/d%3D16/app_id%3D{APP_ID_HERE}/job_id%3D{JOB_ID_HERE}/task_id%3D{TASK_ID_HERE}/unique-csv-file-name-here.csv.gz?X-Amz-Algorithm={AMZ_ALGORITHM_HERE}&X-Amz-Date={AMZ_DATE_HERE}&X-Amz-SignedHeaders={AMZ_SIGNED_HEADERS_HERE}&X-Amz-Expires={AMZ_EXPIRATION_HERE}&X-Amz-Credential={AMZ_CREDENTIAL_HERE}&X-Amz-Signature={AMZ_SIGNATURE_HERE}'
        lines_exported:
          type: integer
          description: Number of objects in the export (e.g. CSV rows).
          example: 43
  securitySchemes:
    appId:
      type: apiKey
      description: app_id | Unique identifier for Branch app of requested data.
      name: app_id
      in: query
    orgId:
      type: apiKey
      description: organization_id | the organization Id with which the Access Token and subscriptions are associated
      name: organization_id
      in: query
    accessToken:
      type: apiKey
      description: |
        Access-Token | Key that encapsulates the users permission w.r.t an org. Obtained from the Branch Dashboard needed for [authentication](https://help.branch.io/developers-hub/docs/branch-aggregate-api#authentication).
      name: Access-Token
      in: header
  examples: {}
