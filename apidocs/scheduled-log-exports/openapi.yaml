        destination:
          type: object
          description: Information about where a finished report is stored and how it can be accessed
          required:
            - subscription_type
          properties:
            subscription_type:
              type: string
              description: 'Should be set to "branch" if you want data stored in Branch''s S3 bucket, and accessible via API'
              example: cloud
              default: branch
              enum:
                - branch
                - email
                - cloud
            cloud:
              type: string
              description: 'For cloud-based destinations. Can be either `s3` or `gcs`.'
              example: s3
            bucket:
              type: string
              description: The cloud bucket being used for subscription.
              example: my-branch-export-bucket
            prefix:
              type: string
              description: The prefix or folder you are using for Branch exports.
              example: my-folder
            resource_access_id:
              type: string
              description: ARN for the Role (AWS) or full service account name (GCP) you are using for Branch exports.
              example: 'arn:aws:iam::xxxxxxxxxxxx:role/role-name-here'
            recipient_emails:
              type: array
              description: 'ONLY FOR `subscription_type`: `email`. List of recipient email addresses.'
              items:
                type: string
      required:
        - report
        - destination
    get_scheduled_log_export_subscription_body:
      type: object
      description: Scheduled Log Subscription Body
      properties:
        subscription_id:
          type: string
          description: A persistent id for the retrieved subscription
          example: XXXX-0000-xxxx
        report:
          type: object
          description: Information about the report that should be generated.
          properties:
            cadence:
              type: string
              example: hourly
              description: 'How frequently the report is generated, and for what time period it is generated. Options: hourly or daily.'
              enum:
                - hourly
                - daily
            response_format:
              type: string
              example: csv
