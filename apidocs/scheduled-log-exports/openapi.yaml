openapi: 3.0.0
info:
  title: Scheduled Log Exports API
  description: The Scheduled Log Exports API allows you to set up a recurring export of select device-level data that run on a daily or hourly basis.
  termsOfService: 'https://branch.io/policies/'
  contact:
    name: Branch Support
    url: 'https://help.branch.io/using-branch/page/submit-a-ticket'
    email: support@branch.io
  version: 1.0.2
servers:
  - url: 'https://api2.branch.io'
security:
  - appId: []
    accessToken: []
tags:
  - name: Scheduled Log Exports API
    description: The Scheduled Log Exports API allows you to set up custom export jobs that run on a daily or hourly basis.
paths:
  /scheduled-exports/logs/subscribe:
    post:
      tags:
        - Scheduled Log Exports API
      summary: Create New Subscription
      description: |
        Set up a new scheduled log export subscription. Supported at both app and org level. The result is a subscription that specifies what data will be exported (e.g. topic, columns, filters) and where data will be exported to
      operationId: createScheduledLogExportSubscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/create_scheduled_log_export_subscription_body'
      responses:
        '200':
          description: Status of aggregate export
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response_200_create_scheduled_log_export_subscription'
        '401':
          description: Auth Client failed response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_401'
              examples:
                Result:
                  value: |-
                    {
                        "error": {
                            "message": "Auth Client didn't return anything for the user id: $userid.",
                            "code": 401
                        }
                    }
        '404':
          description: User Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_404'
              examples:
                Result:
                  value: |-
                    {
                        "error": {
                            "message": "Not authorized for the user id: $userid.",
                            "code": 404
                        }
                    }
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_404'
              examples:
                Result:
                  value: |-
                    {
                        "error": {
                            "message": "Our product is failing to serve your request at this moment. Please try again later.",
                            "code": 500
                        }
                    }
  '/scheduled-exports/logs/subscription/{subscription_id}':
    get:
      tags:
        - Scheduled Log Exports API
      summary: Details on Single Subscription
      description: This endpoint enables developers to retrive the subscription status via the `subscription_url` provided. Do make sure the `subscription_status` is set to `ACTIVE`.
      operationId: checkSubscriptionStatus
      parameters:
        - name: subscription_id
          in: path
          description: |
            A persistent id for the specific subscription.
          required: true
          style: simple
          explode: false
          schema:
            type: string
            example: XXXX-0000-xxxx
      responses:
        '200':
          description: Status of aggregate export
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get_scheduled_log_export_subscription_body'
        '400':
          description: Authentication Failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_400'
              examples:
                Result:
                  value: |-
                    {
                        "error": {
                            "message": "Authentication failed !",
                            "code": 400
                        }
                    }
        '404':
          description: Job ID Not Found
    delete:
      tags:
        - Scheduled Log Exports API
      summary: Deactivate Subscription
      description: |
        Deactivates a single export subscription for a given Subscription Id.
      operationId: deactivateSubscription
      parameters:
        - name: subscription_id
          in: path
          description: |
            A persistent id for the specific subscription.
          required: true
          style: simple
          explode: false
          schema:
            type: string
            example: XXXX-0000-xxxx
      responses:
        '200':
          description: Status of aggregate export
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/deactivate_subscription_body'
        '400':
          description: Authentication Failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_400'
              examples:
                Result:
                  value: |-
                    {
                        "error": {
                            "message": "Authentication failed !",
                            "code": 400
                        }
                    }
        '404':
          description: Job ID Not Found
  '/scheduled-exports/logs/subscription/{subscription_id}/jobs':
    parameters:
      - schema:
          type: string
        name: subscription_id
        in: path
        required: true
        description: 'ID for your subscription. Obtained from the [/subscribe path](https://help.branch.io/developers-hub/reference/createscheduledlogexportsubscription).'
    post:
      summary: Details on Many Export Jobs
      tags:
        - Scheduled Log Exports API
      responses:
        '200':
          description: OK - Returns an array of export jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/get_export_job_body'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_400'
      operationId: getScheduledExportJobs
      parameters:
        - schema:
            type: string
          in: query
          name: app_id
          required: true
          description: Unique identifier for Branch app of requested data.
      security:
        - accessToken: []
      description: 'Once your subscription is active, you can query for the exported data and download the data via the array `export_url`. For data accessible via API, the files are stored in Branch''s S3 bucket, and you are provided a pre-signed S3 URL for exporting data. Typically data is accessible via API for 7 days, so be sure to download your data shortly after it is generated.'
  /scheduled-exports/logs/subscriptions:
    get:
      security:
        - appId: []
          accessToken: []
        - orgId: []
          accessToken: []
      tags:
        - Scheduled Log Exports API
      summary: Details on All Subscriptions
      description: |
        Returns all export subscriptions for an App or Organization. See what data is being exported (e.g. topic, columns, filters) and where data is exported to (e.g. email addresses, your data center, a Branch-hosted S3 bucket). NOTE: Developer either needs to provide app_id or organization_id along with accessToken to execute this operation.
      operationId: getDetailsOnAllExportSubscription
      responses:
        '200':
          description: Array of available subscriptions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/get_scheduled_log_export_subscription_body'
        '400':
          description: Authentication Failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_400'
              examples:
                Result:
                  value: |-
                    {
                        "error": {
                            "message": "Authentication failed !",
                            "code": 400
                        }
                    }
        '404':
          description: Job ID Not Found
  /scheduled-exports/logs/subscription/externalId:
    get:
      security:
        - appId: []
          accessToken: []
        - orgId: []
          accessToken: []
      tags:
        - Scheduled Log Exports API
      summary: Get External ID
      description: |
        Branch provides a unique "external Id" for your Branch account. This should be used when setting up data to be exported to your cloud data service (i.e. S3). NOTE: Developer either needs to provide app_id or organization_id along with accessToken to execute this operation.
      operationId: getExternalIdBranch
      responses:
        '200':
          description: The ID to be used in the Trust Relationship of the Role that you create to allow Branch to access your S3 bucket.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get_external_id_body'
        '400':
          description: Authentication Failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_400'
              examples:
                Result:
                  value: |-
                    {
                        "error": {
                            "message": "Authentication failed !",
                            "code": 400
                        }
                    }
        '404':
          description: Job ID Not Found
  '/scheduled-exports/logs/subscription/{subscription_id}/job/{job_id}':
    get:
      tags:
        - Scheduled Log Exports API
      security:
        - appId: []
          accessToken: []
        - orgId: []
          accessToken: []
      summary: Details on Single Export Job
      description: |
        This endpoint provides a way to get details on the particular job, as long as you know the subscription_id and the job_id. Scheduled exports run at a regular cadence. Each individual run is considered a "job" and has a "job Id".
      operationId: getDetailsOnIndividualExportJob
      parameters:
        - name: subscription_id
          in: path
          description: |
            A persistent id for the specific subscription.
          required: true
          style: simple
          explode: false
          schema:
            type: string
            example: XXXX-0000-xxxx
        - name: job_id
          in: path
          description: |
            The relevant job Id.
          required: true
          style: simple
          explode: false
          schema:
            type: string
            example: XXXX-0000-xxxx
      responses:
        '200':
          description: Export Job success response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get_export_job_body'
        '400':
          description: Authentication Failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_400'
              examples:
                Result:
                  value: |-
                    {
                        "error": {
                            "message": "Authentication failed !",
                            "code": 400
                        }
                    }
        '404':
          description: Job ID Not Found
components:
  schemas:
    create_scheduled_log_export_subscription_body:
      type: object
      description: Create Scheduled Log Export Subscription Request Body
      properties:
        report:
          type: object
          description: Information about the report that should be generated.
          required:
            - cadence
            - response_format
            - report_type
            - report_fields
          properties:
            cadence:
              type: string
              example: hourly
              description: 'How frequently the report is generated, and for what time period it is generated. Options: hourly or daily.'
              enum:
                - hourly
                - daily
              default: hourly
            response_format:
              type: string
              example: csv
              description: 'format in which the export data is delivered. Options: csv, json, parquet.'
              enum:
                - csv
                - json
                - parquet
              default: csv
            response_format_compression:
              type: string
              example: gz
              default: gz
              description: 'method by which the export data should be compressed. Options: gz, snappy. Defaults to gz if not specified.'
              enum:
                - gz
                - snappy
            report_type:
              type: string
              default: eo_install
              example: eo_install
              enum:
                - eo_impression
                - eo_click
                - eo_web_to_app_auto_redirect
                - eo_branch_cta_view
                - eo_open
                - eo_install
                - eo_reinstall
                - eo_web_session_start
                - eo_pageview
                - eo_commerce_event
                - eo_custom_event
                - eo_content_event
                - eo_dismissal
                - eo_user_lifecycle_event
                - skadnetwork_valid_messages
                - eo_click_blocked
                - eo_impression_blocked
                - eo_install_blocked
                - eo_reinstall_blocked
                - eo_open_blocked
                - eo_web_session_start_blocked
                - eo_pageview_blocked
                - eo_custom_event_blocked
                - eo_content_event_blocked
                - eo_commerce_event_blocked
                - eo_user_lifecycle_event_blocked
                - eo_branch_cta_view_blocked
                - eo_web_to_app_auto_redirect_blocked
              description: 'An array representing event type of your report. See [Available Topics](https://help.branch.io/developers-hub/docs/custom-exports#branch-available-topics) the for complete list.'
            report_fields:
              description: 'An array representing fields/columns available in your report. Pass `["all"]` to include every available field. The all fields option requires Sensitive Data, Fraud Settings & Data, and Export permissions. When using `"all"`, new fields are automatically included as they become available — design your systems to handle schema changes gracefully. Parquet is recommended for resilience to schema changes. See [Available EO Fields](https://help.branch.io/developers-hub/docs/custom-exports#branch-available-eo-fields) for the complete list.'
              type: array
              default:
                - name
              example:
                - name
              items:
                type: string
                example: timestamp
                enum:
                  - app_id
                  - app_name
                  - attributed
                  - content_items
                  - custom_data
                  - customer_event_alias
