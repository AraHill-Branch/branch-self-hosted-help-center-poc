        filter:
          type: array
          description: 'A filter requires an array with 3 specific string values: ["[Filter Prefix](https://help.branch.io/developers-hub/docs/custom-exports#cthulhu-filter-specification)", "[EO Field Key](https://help.branch.io/developers-hub/reference/custom-exports-api#available-eo-fields)", "EO Field Value"]'
          example:
            - eq
            - name
            - PURCHASE
          default:
            - eq
            - name
            - PURCHASE
          maxItems: 3
          uniqueItems: true
          items:
            type: string
        response_format:
          description: Format of returned data. json or csv
          type: string
          default: csv
          enum:
            - csv
            - json
        allow_multiple_files:
          type: boolean
          description: Set this parameter to `true` if you want more than 15 million records returned.
        response_format_compression:
          description: |-
            The file compression method to use for the data.
            Required if `allow_multiple_files` is set to `true`.
          enum:
            - gz
            - snappy
    data_readiness_body:
      type: object
      description: Check Data Readiness Request Body
      properties:
        date:
          type: string
          description: 'The start of the interval time range, in the format YYYY-MM-DD hh:mm:ss (must be within the past year).'
          example: '2024-01-05 01:00:00'
        warehouse_meta_type:
          type: string
          description: The type of data to check for.
          example: EVENT
          enum:
            - EVENT
            - AGGREGATE
        topic:
          type: string
          description: The topic associated with the data.
          example: eo_open
          enum:
            - eo_impression
            - eo_click
            - eo_branch_cta_view
            - eo_open
            - eo_install
            - eo_reinstall
            - eo_web_session_start
            - eo_pageview
            - eo_commerce_event
            - eo_custom_event
            - eo_content_event
            - eo_dismissal
            - eo_user_lifecycle_event
            - skadnetwork_valid_messages
            - skadnetwork_invalid_messages
            - webhook2
            - eo_click_blocked
            - eo_impression_blocked
            - eo_install_blocked
            - eo_reinstall_blocked
            - eo_open_blocked
            - eo_web_session_start_blocked
            - eo_pageview_blocked
            - eo_custom_event_blocked
            - eo_content_event_blocked
            - eo_commerce_event_blocked
            - eo_user_lifecycle_event_blocked
            - eo_branch_cta_view_blocked
            - eo_san_touch
        app_id:
          type: integer
          description: 'Your Branch App ID, found under Account Settings in your Branch Dashboard.'
          example: 0
      required:
        - date
        - warehouse_meta_type
        - topic
        - app_id
    inline_response_400:
      type: object
      properties:
        error:
          $ref: '#/components/schemas/inline_response_400_error'
    inline_response_400_error:
      type: object
      properties:
        message:
          type: string
          example: Authentication failed.
        code:
          type: integer
          example: 400
    inline_response_400_data_readiness:
      type: object
      properties:
        error:
          $ref: '#/components/schemas/inline_response_400_data_readiness_error'
    inline_response_400_data_readiness_error:
      type: object
      properties:
        message:
          type: string
          example: Report type is invalid.
        code:
          type: integer
          example: 400
    inline_response_401:
      type: object
      properties:
        error:
          $ref: '#/components/schemas/inline_response_401_error'
    inline_response_401_error:
      type: object
      properties:
        message:
          type: string
          example: Auth Client failed response
        code:
          type: integer
