openapi: 3.0.0
info:
  title: Custom Exports API
  description: Export log-level and aggregate-level data for measuring campaign performance.
  termsOfService: 'https://branch.io/policies/'
  contact:
    name: Branch Support
    url: 'https://help.branch.io/using-branch/page/submit-a-ticket'
    email: support@branch.io
  version: 1.0.1
servers:
  - url: 'https://api2.branch.io/v2'
security:
  - appId: []
    accessToken: []
tags:
  - name: Custom Exports API
    description: Custom Exports API find and queue log records that match your search criteria for export.
paths:
  /logs:
    post:
      tags:
        - Custom Exports API
      summary: Create Export Request
      description: |
        By passing in the appropriate options, you can find and queue all records that match search criteria for export and build the relevant export request accordingly.
      operationId: buildExportRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/custom_exports_body'
      responses:
        '200':
          description: Status of aggregate export
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_200_post_export'
              examples:
                Result:
                  value: |
                    {
                      "handle": "xxxx-0000",
                      "export_job_status_url": "https://api2.branch.io/v2/logs/{JOB_HANDLE}?app_id={APP_ID}"
                    }
        '401':
          description: Auth Client failed response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_401'
              examples:
                Result:
                  value: |-
                    {
                        "error": {
                            "message": "Auth Client didn't return anything for the user id: $userid.",
                            "code": 401
                        }
                    }
        '404':
          description: User Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_404'
              examples:
                Result:
                  value: |-
                    {
                        "error": {
                            "message": "Not authorized for the user id: $userid.",
                            "code": 404
                        }
                    }
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_500'
              examples:
                Result:
                  value: |-
                    {
                        "error": {
                            "message": "Our product is failing to serve your request at this moment. Please try again later.",
                            "code": 500
                        }
                    }
  '/logs/{request_handle}':
    get:
      tags:
        - Custom Exports API
      summary: Get Export Request
      description: |
        Retrieves custom export request logs based on the provided request handle id
      operationId: getDownloadExportRequest
      parameters:
        - name: request_handle
          in: path
          description: |
            The ID returned by the log export queue.
          required: true
          style: simple
          explode: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of results to return.
          required: false
          style: form
          explode: true
          schema:
            minimum: 1
            type: integer
            format: int32
        - name: format
          in: query
          description: Format of returned data. json or csv
          required: false
          style: form
          explode: true
          schema:
            type: string
            default: csv
            enum:
              - csv
              - json
      responses:
        '200':
          description: Status of aggregate export
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_200_get_export'
              examples:
                Result:
                  value:
                    status: complete
                    response_url: 'https://branch-exports-web-usw2.s3.us-west-1.amazonaws.com/v2/y%3D2023/m%3D05/d%3D17/app_id%3D{APP_ID}/job_id%3Da1b2c3d4/task_id%3D{TASK_ID}/unique-csv-file-name-here.csv?X-Amz-Algorithm={AMZ_ALGORITHM}&X-Amz-Date={AMZ_DATE}&X-Amz-SignedHeaders={AMZ_SIGNED_HEADERS}&X-Amz-Expires={AMZ_EXPIRATION}&X-Amz-Credential={AMZ_CREDENTIAL}&X-Amz-Signature={AMZ_SIGNATURE}'
                    lines_exported: 0
                    code: 200
        '400':
          description: Bad request — typically an invalid or missing credential or parameter.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_400'
              examples:
                Result:
                  value: |-
                    {
                        "error": {
                            "message": "Authentication failed.",
                            "code": 400
                        }
                    }
        '404':
          description: Job ID Not Found
  /data/ready:
    post:
      tags:
        - Custom Exports API
      summary: Check Data Readiness
      description: |
        Check if event or aggregate data is ready and available for a topic, for a particular hour of the day.
      operationId: checkDataReadiness
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/data_readiness_body'
      responses:
        '200':
          description: Data Readiness Status Successfully Retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_200_post_data_readiness'
              examples:
                Result:
                  value: |
                    {
                      "data_ready": true,
                      "date": "2024-01-05 01:00:00"
                    }
        '400':
          description: Invalid Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_400_data_readiness'
              examples:
                Result:
                  value: |-
                    {
                        "error": {
                            "message": "Topic is invalid or data retention for requested data has expired.",
                            "code": 400
                        }
                    }
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_500'
              examples:
                Result:
                  value: |-
                    {
                        "error": {
                            "message": "Our product is failing to serve your request at this moment. Please try again later.",
                            "code": 500
                        }
                    }
components:
  schemas:
    inline_response_200_get_export:
      type: object
      properties:
        code:
          type: integer
          example: 200
          description: Response code
        lines_exported:
          type: integer
          example: 2000000
          description: Number of lines exported against the originated request.
        status:
          type: string
          example: complete
          enum:
            - pending
            - running
            - complete
            - fail
          description: Request status over the current execution time
        status_url:
          type: string
          description: The URL of the export request.
          example: 'https://branch-exports-web-usw2.s3.us-west-1.amazonaws.com/v2/y%3D2023/m%3D05/d%3D17/app_id%3D{APP_ID}/job_id%3Da1b2c3d4/task_id%3D{TASK_ID}/unique-csv-file-name-here.csv?X-Amz-Algorithm={AMZ_ALGORITHM}&X-Amz-Date={AMZ_DATE}&X-Amz-SignedHeaders={AMZ_SIGNED_HEADERS}&X-Amz-Expires={AMZ_EXPIRATION}&X-Amz-Credential={AMZ_CREDENTIAL}&X-Amz-Signature={AMZ_SIGNATURE}'
    inline_response_200_post_export:
      type: object
      properties:
        handle:
          type: string
          example: xxxx-0000
          description: Unique request handle generated against the endpoint call.
        export_job_status_url:
          type: string
          description: The URL of the export request.
          example: 'https://api2.branch.io/v2/logs/{JOB_HANDLE}?app_id={APP_ID}'
    inline_response_200_post_data_readiness:
      type: object
      properties:
        data_ready:
          type: boolean
          example: true
          description: Whether the data is currently available.
        date:
          type: string
          description: The date associated with the data.
          example: '2024-01-05 01:00:00'
    custom_exports_body:
      type: object
      description: Custom Exports Request Body
      required:
        - start_date
        - end_date
        - report_type
        - fields
        - limit
      properties:
        start_date:
          type: string
          description: 'The start of the interval time range represented as an ISO-8601 complete datetime including Hours, Minutes, Seconds, and Milliseconds. Datetime must be within the last 120 days.'
          format: date-time
          example: '2023-05-15T00:00:00Z'
        end_date:
          type: string
          description: 'The end of the interval time range represented as an ISO-8601 complete datetime including Hours, Minutes, Seconds, and Milliseconds.'
          format: date-time
          example: '2023-05-15T01:59:59Z'
        report_type:
          type: string
          example: eo_open
          default: eo_open
          enum:
            - eo_impression
            - eo_click
            - eo_branch_cta_view
            - eo_open
            - eo_install
            - eo_reinstall
            - eo_web_session_start
            - eo_pageview
            - eo_commerce_event
            - eo_custom_event
            - eo_content_event
            - eo_dismissal
            - eo_user_lifecycle_event
            - skadnetwork_valid_messages
            - skadnetwork_invalid_messages
            - webhook2
            - eo_click_blocked
            - eo_impression_blocked
            - eo_install_blocked
            - eo_reinstall_blocked
            - eo_open_blocked
            - eo_web_session_start_blocked
            - eo_pageview_blocked
            - eo_custom_event_blocked
            - eo_content_event_blocked
            - eo_commerce_event_blocked
            - eo_user_lifecycle_event_blocked
            - eo_branch_cta_view_blocked
            - eo_san_touch
          description: 'An array representing event type of your report. See [Available Topics](https://help.branch.io/developers-hub/docs/custom-exports#branch-available-topics) the for complete list.'
        fields:
          description: 'An array representing fields/columns available in your report. Pass `["all"]` to include every available field. The all fields option requires Sensitive Data, Fraud Settings & Data, and Export permissions. When using `"all"`, new fields are automatically included as they become available — design your systems to handle schema changes gracefully. See [Available EO Fields](https://help.branch.io/developers-hub/docs/custom-exports#branch-available-eo-fields) for the complete list.'
          type: array
          default:
            - name
          example:
            - name
          items:
            type: string
            example: timestamp
            enum:
              - app_id
              - app_name
              - attributed
              - content_items
