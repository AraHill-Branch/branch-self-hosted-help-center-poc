      type: object
      properties:
        message:
          type: string
          example: Internal Server Error
        code:
          type: integer
          example: 500
  securitySchemes:
    appId:
      type: apiKey
      description: app_id | Unique identifier for Branch app of requested data.
      name: app_id
      in: query
    accessToken:
      type: apiKey
      description: |
        Encapsulates your account permissions for an organization. Obtain it from the Branch Dashboard.
      name: Access-Token
      in: header
  examples: {}
