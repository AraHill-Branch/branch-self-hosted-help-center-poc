openapi: 3.0.0
info:
  title: Daily Exports API
  description: Export ALL device-level data from a specific day.
  termsOfService: 'https://branch.io/policies/'
  contact:
    name: Branch Support
    url: 'https://help.branch.io/using-branch/page/submit-a-ticket'
    email: support@branch.io
  version: 1.0.0
servers:
  - url: 'https://api2.branch.io/v3'
tags:
  - name: Daily Exports API
    description: Daily Exports API pull granular Branch event data directly
paths:
  /export:
    post:
      tags:
        - Daily Exports API
      summary: Request Daily Export
      description: |
        Export ALL device-level data from a specific day.
      operationId: postDailyExports
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/daily_exports_body'
      responses:
        '200':
          description: Status of aggregate export
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_200_post_daily_export'
        '400':
          description: Authentication Failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_400'
              examples:
                Result:
                  value: |-
                    {
                        "error": {
                            "message": "Authentication failed !",
                            "code": 400
                        }
                    }
components:
  schemas:
    daily_exports_body:
      type: object
      description: Daily Exports Request Body
      properties:
        branch_key:
          description: 'The Branch Key of the originating app obtained in your [Account Settings](https://help.branch.io/using-branch/docs/profile-settings)'
          type: string
          example: key_live_xxxx
        branch_secret:
          description: 'The Branch Secret Key of the originating app obtained in your [Account Settings](https://help.branch.io/using-branch/docs/profile-settings)'
          type: string
          example: secret_live_xxxx
        export_date:
          description: The UTC date of the requested data export.
          type: string
          format: date
          example: '2023-05-19'
      required:
        - branch_key
        - branch_secret
        - export_date
    inline_response_200_post_daily_export:
      type: object
      properties:
        eo_branch_cta_view:
          description: N/A
          type: array
          items:
            type: string
