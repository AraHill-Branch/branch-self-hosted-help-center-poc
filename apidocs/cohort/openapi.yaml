      type: object
      properties:
        status:
          type: string
          example: FINISHED
          description: Status of the query.
          enum:
            - FINISHED
            - QUEUED
            - RUNNING
            - ERROR
        code:
          type: integer
          example: 200
          description: HTTP-style code representing the outcome of the status request. A 1xx value indicates a QUEUED or RUNNING status.
        response_url:
          type: string
          example: 'https://api2.branch.io/v2/analytics/{UNIQUE_ALPHANUMERICAL_STATUS_PATH_HERE}'
