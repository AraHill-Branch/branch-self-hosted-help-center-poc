openapi: 3.0.0
info:
  title: Cohort API
  description: The Cohort API allows you to programmatically query and export Cohort analytics
  termsOfService: 'https://branch.io/policies/'
  contact:
    name: Branch Support
    url: 'https://help.branch.io/using-branch/page/submit-a-ticket'
    email: support@branch.io
  version: 1.0.1
servers:
  - url: 'https://api2.branch.io/v2'
security:
  - accessToken: []
tags:
  - name: Cohort API
    description: |
      The Cohort API allows you to programmatically query and export Cohort analytics
paths:
  /analytics:
    post:
      tags:
        - Cohort API
      summary: Export Cohort Analytics
      description: |
        This endpoint provisions querying and export Cohort analytics
      operationId: exportCohortAnalytics
      parameters:
        - name: app_id
          in: query
          description: app_id | Unique identifier for Branch app of requested data. Either appId or organization_id is required.
          required: true
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of results to return.
          required: false
          style: form
          explode: true
          schema:
            maximum: 50000
            minimum: 1
            type: integer
            format: int32
        - name: format
          in: query
          description: Format of returned data. json or csv
          required: false
          style: form
          explode: true
          schema:
            type: string
            default: csv
            enum:
              - csv
              - json
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/cohort_request_body'
      responses:
        '200':
          description: Status of aggregate export
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cohort_200_response_body'
        '400':
          description: Authentication Failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_400'
              examples:
                Result:
                  value: |-
                    {
                        "error": {
                            "message": "Authentication failed !",
                            "code": 400
                        }
                    }
  '/analytics/{job_id}':
    get:
      tags:
        - Cohort API
      summary: Get Export Download Status
      description: |
        This endpoint provisions querying and export Cohort analytics
      operationId: getCohortExportStatus
      parameters:
        - name: app_id
          in: query
          description: app_id | Unique identifier for Branch app of requested data. Either appId or organization_id is required.
          required: true
          schema:
            type: string
        - name: job_id
          in: path
          description: Unique identifier for job. Obtained from POST Export Cohort Analytics API.
          required: true
          schema:
            type: string
            example: 0000-XXxx
        - name: format
          in: query
          description: Format of returned data. json or csv
          required: false
          style: form
          explode: true
          schema:
            type: string
            default: csv
            enum:
              - csv
              - json
      responses:
        '200':
          description: Status of aggregate export
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cohort_export_download_200_response_body'
        '400':
          description: Authentication Failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_400'
              examples:
                Result:
                  value: |-
                    {
                        "error": {
                            "message": "Authentication failed !",
                            "code": 400
                        }
                    }
