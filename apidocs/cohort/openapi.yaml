    cohort_request_body:
      type: object
      description: Cohort Request Body
      properties:
        start_date:
          type: string
          format: date
          description: The start of the interval time range represented as an ISO-8601 complete date.
          example: '2023-05-15'
        end_date:
          type: string
          format: date
          description: The end of the interval time range represented as an ISO-8601 complete date.
          example: '2023-05-16'
        data_source:
          type: string
          enum:
            - install_cohort
            - reengagement_cohort
          default: install_cohort
          example: install_cohort
          description: A string value representing the cohort type
        measures:
          maxItems: 3
          minItems: 1
          type: array
          description: |
            The cohort measures to return. Limit is 3.See [Measure](https://help.branch.io/developers-hub/docs/cohort-exports#section-measures) for complete list.
          default:
            - OPEN
          example:
            - OPEN
          items:
            type: string
            enum:
              - OPEN
              - users
              - Retention
              - ARPPU
              - LTV
              - ARPU
              - revenue
              - PURCHASE
              - ADD_TO_CART
              - ADD_TO_WISHLIST
              - VIEW_CART
              - INITIATE_PURCHASE
              - ADD_PAYMENT_INFO
              - SPENG_CREDITS
              - RESERVE
              - CLICK_AD
              - VIEW_AD
              - SEARCH
              - VIEW_ITEM
              - VIEW_ITEMS
              - RATE
              - SHARE
              - COMPLETE_REGISTRATION
              - COMPLETE_TUTORIAL
              - ACHIEVE_LEVEL
              - UNLOCK_ACHIEVEMENT
              - INVITE
              - LOGIN
              - SUBSCRIBE
              - START_TRIAL
              - cost
              - GROSS_PROFIT
              - ROI
              - ROAS
              - eCPA
        granularity_band_count:
          type: integer
          description: Number of time units since the cohort event to return to the user.
          example: 7
          default: 7
        dimensions:
          maxItems: 11
          minItems: 1
          type: array
          description: |
            An array representing dimension(s) to group by. Limit is 11. See [Dimensions](https://help.branch.io/developers-hub/docs/cohort-exports#section-dimensions) for complete list.
